<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>yii web</title>
        <script src="script.ts" type="module" defer></script>
        <link href="style.css" rel="stylesheet">
    </head>
    <body>
        <h1>yii web config/remote</h1>
        <div id="config">
            <label for="name">name: </label><input id="name"><br>
            <label for="password">password: </label><input id="password" type="password"><br>
            <button id="save">save</button>
        </div>
        <div id="remote">
            <select id="devices"></select><br>
            <button id="feed">feed</button>
            <button id="poke">poke</button>
            <button id="play-rps">play rock, paper, scissors</button>
            <div id="rps">
                <button id="rock">rock</button>
                <button id="paper">paper</button>
                <button id="scissors">scissors</button>
            </div>
        </div>

        <button id="connect">connect</button>
    </body>
</html>
